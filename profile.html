<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melao - Perfil</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="mobile-navbar">
        <a href="home.html">
            <img src="img/left_arrow.svg" width="24" height="24" alt="Back">
        </a>
        <p>Ethan Harper</p>
    </header>
    <div class="desktop-navbar">
        <ul class="nav-list">
            <li>
                <a class="logo-container" href="home.html">
                    <img src="img/logoIcono.png" alt="Home">
                    <p class="logo-text">Melao</p>
                </a>
            </li>
            <li><a href="newPostView.html">Publicar</a></li>
            <li><a href="chatListView.html">Chat</a></li>
            <li><a href="friendsList.html">Amigos</a></li>
            <li><a href="searchPersonView.html">Buscar Personas</a></li>
        </ul>
        <ul class="nav-list">
            <li class="right-nav-item">
                <a href="viewNotifications.html">
                    <img src="img/bell.svg" alt="Notificaciones">
                </a>
            </li>
            <li class="right-nav-item">
                <a href="profile.html">
                    <img src="img/pfp_example.png" alt="Perfil">
                </a>
            </li>
        </ul>
    </div>
    
    <main>
        <div class="ProfilePannel">
            <img id="ProfileImage" alt="Imagen de perfil">
            <p id="ProfileName"></p>
            <div class="ProfileButtonsDiv">
                <a href="modifyProfile.html">
                    <input type="button" value="Editar Perfil" class="ProfileButton" id="EditProfileButton"/>
                </a>
                <input type="button" value="Compartir Perfil" class="ProfileButton" id="ShareProfileButton"/>
            </div>
            <p class="title">Sobre Mi</p>
            <p class="about-me">Soy estudiante de la UCV, me gusta el café y los videojuegos. Actualmente estudio ATI y disfruto aprender sobre nuevas tecnologías.</p>
            <p class="title">Muro</p>
            <div class="Posts"></div> 
        </div>
    </main>

    <footer>
        <nav class="Menu">
            <ul class="footer-list">
                <li><a href="home.html"><img src="img/HomeIconSelected.png" alt="Home"></a></li>
                <li><a href="friendsList.html"><img src="img/FriendsIcon.png" alt="Friends"></a></li>
                <li><a href="chatListView.html"><img src="img/ChatIcon.png" alt="Chat"></a></li>
                <li><a href="newPostView.html"><img src="img/PostIcon.png" alt="Post"></a></li>
                <li><a href="viewNotifications.html"><img src="img/NotificationsIcon.png" alt="Bell"></a></li>
                <li><a href="profile.html"><img src="img/UserIcon.png" alt="User"></a></li>
            </ul>
        </nav>
    </footer>

    <script>
        let dataDummy = [
            {
                name: "Ethan Hunt",
                image: "img/EthanHuntProfile.png",
                postDescription: "Alrededor de las 7 PM, nos reuniremos en la biblioteca.",
                last_connection: "2d",
                likes: 12,
                comments: 5
            },
            {
                name: "Ethan Hunt",
                image: "img/EthanHuntProfile.png",
                postDescription: "ATI es lo más duro del planeta chamo.",
                last_connection: "1d",
                likes: 25,
                comments: 10
            },
            {
                name: "Ethan Hunt",
                image: "img/EthanHuntProfile.png",
                postDescription: "Alrededor de las 7 PM, nos reuniremos en la biblioteca.",
                last_connection: "2d",
                likes: 12,
                comments: 5
            },
            {
                name: "Ethan Hunt",
                image: "img/EthanHuntProfile.png",
                postDescription: "ATI es lo más duro del planeta chamo.",
                last_connection: "1d",
                likes: 25,
                comments: 10
            }
        ];

        function renderProfileImage(image){
            document.getElementById("ProfileName").innerText = "Ethan Hunt";
            document.getElementById("ProfileImage").setAttribute("src", image);
        }

        function renderPosts(posts) {
            document.getElementsByClassName("Posts");
            posts.forEach(element => {
                const postDiv = document.createElement("div");
                postDiv.setAttribute("class", "ProfilePost");

                const postImg = document.createElement("img");
                postImg.setAttribute("src", element.image);
                postImg.setAttribute("width", "70");
                postImg.setAttribute("height", "70");
                postImg.setAttribute("alt", "Profile picture");

                const postName = document.createElement("p");
                postName.setAttribute("class", "person-name");
                postName.innerText = element.name;

                const postDescription = document.createElement("p");
                postDescription.setAttribute("class", "PostDescription");
                postDescription.innerText = element.postDescription;

                const postlast_connection = document.createElement("p");
                postlast_connection.setAttribute("class", "last_connection");
                postlast_connection.innerText = element.last_connection;

                const postLikes = document.createElement("div");
                postLikes.setAttribute("class", "PostLikes");

                const likeImg = document.createElement("img");
                likeImg.setAttribute("src", "img/Like.png");
                likeImg.setAttribute("width", "20");
                likeImg.setAttribute("height", "20");
                likeImg.setAttribute("alt", "Like");

                const likesCount = document.createElement("p");
                likesCount.setAttribute("class", "LikesCount");
                likesCount.innerText = element.likes;

                const postComments = document.createElement("div");
                postComments.setAttribute("class", "PostComments");
                const commentImg = document.createElement("img");
                commentImg.setAttribute("src", "img/Comment.png");
                commentImg.setAttribute("width", "20");
                commentImg.setAttribute("height", "20");
                commentImg.setAttribute("alt", "Comment");
                const commentsCount = document.createElement("p");
                commentsCount.setAttribute("class", "CommentsCount");
                commentsCount.innerText = element.comments;

                postDiv.appendChild(postImg);
                postDiv.appendChild(postName);
                postDiv.appendChild(postDescription);
                postDiv.appendChild(postlast_connection);
                postLikes.appendChild(likeImg);
                postLikes.appendChild(likesCount);
                postComments.appendChild(commentImg);
                postComments.appendChild(commentsCount);
                postDiv.appendChild(postLikes);
                postDiv.appendChild(postComments);
                document.getElementsByClassName("Posts")[0].appendChild(postDiv);
            });
        }

        document.addEventListener("DOMContentLoaded", function() {
            renderPosts(dataDummy);
            renderProfileImage("img/EthanHuntProfile.png");
        });
    </script>
</body>
</html>
