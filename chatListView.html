<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melao - Chat</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/chatList.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="mobile-navbar">
        <a href="home.html">
            <img src="img/left_arrow.svg" width="24" height="24" alt="X">
        </a>
        <p>Ethan Harper</p>
    </header>
    <div class="desktop-navbar">
        <ul class="nav-list">
            <li>
                <a class="logo-container" href="home.html">
                    <img src="img/logoIcono.png" alt="Home">
                    <p class="logo-text">Melao</p>
                </a>
            </li>
            <li><a href="newPostView.html">Publicar</a></li>
            <li><a href="chatListView.html">Chat</a></li>
            <li><a href="friendsList.html">Amigos</a></li>
            <li><a href="searchPersonView.html">Buscar Personas</a></li>
        </ul>
        <ul class="nav-list">
            <li class="right-nav-item">
                <a href="viewNotifications.html">
                    <img src="img/bell.svg" alt="Notificaciones">
                </a>
            </li>
            <li class="right-nav-item">
                <a href="profile.html">
                    <img src="img/pfp_example.png" alt="Perfil">
                </a>
            </li>
        </ul>
    </div>
    
    <main>
        <div class="chats-pannel"></div>
    </main>

    <footer>
        <nav class="Menu">
            <ul class="footer-list">
                <li><a href="home.html"><img src="img/HomeIconSelected.png" alt="Home"></a></li>
                <li><a href="friendsList.html"><img src="img/FriendsIcon.png" alt="Friends"></a></li>
                <li><a href="chatListView.html"><img src="img/ChatIcon.png" alt="Chat"></a></li>
                <li><a href="newPostView.html"><img src="img/PostIcon.png" alt="Post"></a></li>
                <li><a href="viewNotifications.html"><img src="img/NotificationsIcon.png" alt="Bell"></a></li>
                <li><a href="profile.html"><img src="img/UserIcon.png" alt="User"></a></li>
            </ul>
        </nav>
    </footer>

    <script>
        let dataDummy = [
            {
                name: "Ethan Hunt",
                image: "img/EthanHuntProfile.png",
                last_connection: "Activo ahora"
            },
            {
                name: "Ethan Hunt",
                image: "img/EthanHuntProfile.png",
                last_connection: "Activo hace 2d"
            },
            {
                name: "Ethan Hunt",
                image: "img/EthanHuntProfile.png",
                last_connection: "Activo hace 5 min"
            },
            {
                name: "Ethan Hunt",
                image: "img/EthanHuntProfile.png",
                last_connection: "Activo hace 2h"
            },
            {
                name: "Ethan Hunt",
                image: "img/EthanHuntProfile.png",
                last_connection: "Activo hace 1 semana"
            }
        ];

        function renderPeople(people) {
            people.forEach(element => {
                const personLink = document.createElement("a");
                personLink.setAttribute("class", "person");
                personLink.setAttribute("href", "chatView.html");

                const personImg = document.createElement("img");
                personImg.setAttribute("src", element.image);
                personImg.setAttribute("width", "70");
                personImg.setAttribute("height", "70");
                personImg.setAttribute("alt", "X");

                const person_name = document.createElement("p");
                person_name.setAttribute("class", "person-name");
                person_name.innerText = element.name;

                const personlast_connection = document.createElement("p");
                personlast_connection.setAttribute("class", "last-connection");
                personlast_connection.innerText = element.last_connection;

                personLink.appendChild(personImg);
                personLink.appendChild(person_name);
                personLink.appendChild(personlast_connection);

                document.getElementsByClassName("chats-pannel")[0].appendChild(personLink);
            });
        }

        document.addEventListener("DOMContentLoaded", function() {
            renderPeople(dataDummy);
        });
    </script>
</body>
</html>
