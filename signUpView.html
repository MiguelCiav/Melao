<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear una cuenta</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/signUpView.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="mobile-navbar">
        <p>Crear una cuenta</p>
    </header>
    <div class="desktop-navbar">
        <ul class="nav-list">
            <li>
                <a class="logo-container" href="welcome.html">
                    <img src="img/logoIcono.png" alt="Home">
                    <p class="logo-text">Melao</p>
                </a>
            </li>
        </ul>
    </div>
    
    <main>
        <div class="welcome-container">
            <div class="welcome-logo desktop-content">
                <img src="img/logo.png" alt="Logo de Melao" class="Logo" width="80" height="80">
                <h1>Crear una cuenta</h1>
            </div>

            <input type="text" placeholder="Nombre completo" class="input-field" id="name">
            <input type="text" placeholder="Usuario" class="input-field">
            <input type="email" placeholder="Correo electronico" class="input-field">
            <input type="password" placeholder="Contraseña" class="input-field">
            <input type="date" class="input-field">

            <button onclick="window.location.href='home.html'" class="button">
                Registrarse
            </button>
            <button onclick="window.location.href='welcome.html'" class="button sign-up">
                Volver
            </button>
        </div>
    </main>

    <footer>
        <p>Al registrarte, aceptas nuestras Condiciones, Política de Privacidad y Uso de Cookies.</p>
    </footer>
</body>
</html>
